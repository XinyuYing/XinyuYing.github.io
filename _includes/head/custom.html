{% include base_path %}

<!-- start custom head snippets -->

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Patch CSS (cache-busting) -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/patch.css?v={{ site.time | date: '%s' }}"/>

<!-- favicon ... -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- hreflang for bilingual pages -->
{% if page.lang_pair %}
  {% if page.lang == "en" %}
    <link rel="alternate" hreflang="zh" href="{{ site.url }}{{ page.lang_pair }}" />
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}" />
  {% else %}
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.lang_pair }}" />
    <link rel="alternate" hreflang="zh" href="{{ site.url }}{{ page.url }}" />
  {% endif %}
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}" />
{% endif %}

<!-- end custom head snippets -->
