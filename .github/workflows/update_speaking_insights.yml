name: Update Speaking Insights

on:
  schedule:
    # 11:20 Asia/Shanghai on the first day of every month.
    - cron: "20 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-speaking-insights
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update speaking page from CEIBS
        run: python scripts/update_speaking_from_ceibs.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- _pages/speaking.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push speaking updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _pages/speaking.md
          git commit -m "Update speaking insights from CEIBS"
          git push

      - name: Setup Ruby
        if: steps.changes.outputs.changed == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build Site
        if: steps.changes.outputs.changed == 'true'
        run: |
          bundle install
          bundle exec jekyll build

      - name: Deploy to Server
        if: steps.changes.outputs.changed == 'true'
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: "_site/"
          REMOTE_HOST: "47.99.57.64"
          REMOTE_USER: "root"
          TARGET: "/www/wwwroot/yrtan.com/"
